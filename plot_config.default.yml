# ============================================================
# plot_config.default.yml — RNA-seq 可視化設定テンプレート
# ============================================================
# このファイルはGit管理されるデフォルト設定です。
#
# 個人カスタマイズの手順:
#   1. cp plot_config.default.yml plot_config.yml
#   2. plot_config.yml を自由に編集
#   3. plot_config.yml は .gitignore に含まれるためGitに反映されません
#
# スクリプトは plot_config.yml → plot_config.default.yml の順に読み込みます。
# ============================================================

# ----------------------------------------------------------
# 全体テーマ
# ----------------------------------------------------------
theme:
  base_family: "sans"           # フォントファミリー ("sans", "serif", "mono", "Arial", etc.)
  base_size: 12                 # 基本フォントサイズ (pt)
  ggplot_theme: "theme_bw"     # ggplot2テーマ ("theme_bw", "theme_classic", "theme_minimal", etc.)

# ----------------------------------------------------------
# 図のサイズ (インチ)
# ----------------------------------------------------------
figure_size:
  pca:
    width: 8
    height: 7
  umap:
    width: 9
    height: 7
  volcano:
    width: 6
    height: 6
  heatmap:
    width: 10
    height: 8
  fgsea_bar:
    width: 12
    height: 8
  gene_plot:
    width: 4.5
    height: 4.2
  exon_usage:
    width: 12
    height: 6

# ----------------------------------------------------------
# 出力形式
# ----------------------------------------------------------
output:
  format: "png"                 # "png", "pdf", "svg", "tiff"
  dpi: 600                      # 解像度 (png/tiff用)

# ----------------------------------------------------------
# カラーパレット
# ----------------------------------------------------------
colors:
  # グループ比較用の離散カラー（グループ数に応じて先頭から使用）
  group_palette:
    - "#E64B35"    # 赤
    - "#4DBBD5"    # 水色
    - "#00A087"    # 緑
    - "#3C5488"    # 紺
    - "#F39B7F"    # サーモン
    - "#8491B4"    # 灰青
    - "#91D1C2"    # ミント
    - "#DC9100"    # オレンジ
    - "#7E6148"    # 茶
    - "#B09C85"    # ベージュ

  # 特定の名前付きグループに色を割り当てる場合（オプション）
  # group_colors:
  #   WT: "#4DBBD5"
  #   KO: "#E64B35"
  #   Treated: "#00A087"

  # ヒートマップカラー
  heatmap:
    low: "#313695"
    mid: "#FFFFBF"
    high: "#A50026"

  # Volcano plot
  volcano:
    up: "#F73719"
    down: "#33DFD4"
    ns: "#CACACA"
    marked: "#FFFF00"

# ----------------------------------------------------------
# PCA プロット
# ----------------------------------------------------------
pca:
  point_size: 8
  point_alpha: 0.8
  label_size: 3
  show_labels: true             # サンプルラベル表示
  ellipse: false                # グループ楕円表示
  ellipse_alpha: 0.1

# ----------------------------------------------------------
# UMAP プロット
# ----------------------------------------------------------
umap:
  point_size: 5
  point_alpha: 0.8
  label_size: 3
  show_labels: true
  n_neighbors: 3               # UMAP n_neighbors (サンプル数-1 以下)

# ----------------------------------------------------------
# Volcano プロット
# ----------------------------------------------------------
volcano:
  point_size: 1.5
  marked_point_size: 3
  label_size: 4
  label_top_n: 15              # ラベル表示する上位遺伝子数 (highlight_genes 以外)
  alpha_ns: 0.7                # 非有意点の透明度
  nudge_y: 20                  # ラベルの y 方向オフセット
  nudge_x_pos: 30              # 正方向ラベルの x オフセット
  nudge_x_neg: -30             # 負方向ラベルの x オフセット
  label_color: "#000066"       # ラベル文字色

# ----------------------------------------------------------
# ヒートマップ
# ----------------------------------------------------------
heatmap:
  show_rownames: false
  show_colnames: true
  cluster_rows: true
  cluster_cols: true
  scale: "row"                  # "row", "column", "none"
  top_n: 50                     # 表示する上位変動遺伝子数

# ----------------------------------------------------------
# single-sample GSEA
# ----------------------------------------------------------
ssgsea:
  gene_sets:
    - "WP_SENESCENCEASSOCIATED_SECRETORY_PHENOTYPE_SASP"
    - "REACTOME_OXIDATIVE_STRESS_INDUCED_SENESCENCE"
    - "REACTOME_NONHOMOLOGOUS_END_JOINING_NHEJ"
    - "REACTOME_G2_M_DNA_DAMAGE_CHECKPOINT"
    - "REACTOME_DNA_DOUBLE_STRAND_BREAK_RESPONSE"
    - "REACTOME_DNA_DAMAGE_TELOMERE_STRESS_INDUCED_SENESCENCE"
    - "JAATINEN_HEMATOPOIETIC_STEM_CELL_DN"
    - "GERY_CEBP_TARGETS"
    - "REACTOME_REGULATION_OF_PTEN_GENE_TRANSCRIPTION"
    - "MCBRYAN_PUBERTAL_TGFB1_TARGETS_UP"
    - "WONG_ADULT_TISSUE_STEM_MODULE"
    - "LEE_BMP2_TARGETS_UP"
    - "LEE_NEURAL_CREST_STEM_CELL_UP"
    - "BOQUEST_STEM_CELL_CULTURED_VS_FRESH_UP"

# ----------------------------------------------------------
# 個別遺伝子ヒートマップ / グラフ
# ----------------------------------------------------------
selected_genes:
  genes:
    - "DDIT3"
    - "CFB"
    - "ARRDC3"
    - "FOS"
    - "ATF3"
    - "H1-3"
    - "H2BC3"
    - "SCIMP"
    - "BNIPL"
    - "LILRA4"
    - "CD69"
    - "SDE2"
    - "IFI30"
    - "PAIP1P1"
    - "H3C13"
    - "SOCS3"
    - "H1-4"
    - "H3-3B"
    - "CDKN1B"
    - "H4C6"
    - "EXO1"
    - "BRCA1"
    - "VCAN"
    - "SMAD7"
    - "HMOX1"
    - "MMP9"
  heatmap_title: "Selected genes"
  expression_label: "log1p(normalized counts)"
  show_rownames: true
  show_colnames: true

# ----------------------------------------------------------
# fGSEA バープロット
# ----------------------------------------------------------
fgsea:
  top_n_plot: 20               # バープロットに表示する上位パスウェイ数
  bar_width: 0.7
